<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Карта Краснодарского края</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
   #map {
       height: 100vh;
       width: 100%;
   }
   .author {
       position: fixed;
       bottom: 15px;
       left: 15px;
       z-index: 9999;
       background: white;
       padding: 8px 12px;
       border-radius: 8px;
       box-shadow: 0 0 10px rgba(0,0,0,0.3);
       font-size: 14px;
   }
</style>
</head>
<body>
<div id="map"></div>
<div class="author">
<b>Автор:</b> Скворцова Яна Александровна
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var map = L.map('map').setView([45.0355, 38.9753], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
   attribution: 'OpenStreetMap'
}).addTo(map);
var places = [
   ["Парк «Краснодар»", 45.0355, 38.9753],
   ["Олимпийский парк", 43.4042, 39.9562],
   ["Скайпарк", 43.6150, 39.7225],
   ["Красная Поляна", 43.6693, 40.4074],
   ["Гора Ахун", 43.6102, 39.7218],
   ["Дольмены Геленджика", 44.5615, 38.0664],
   ["Озеро Абрау", 44.5669, 38.0597],
   ["Озеро Сукко", 44.5519, 38.0985],
   ["Плато Лагонаки", 44.2247, 40.1500],
   ["Тисо-самшитовая роща", 43.6174, 39.7476],
   ["Агурские водопады", 43.6571, 39.7190],
   ["Орлиные скалы", 43.6301, 39.7334],
   ["Ахштырская пещера", 43.6353, 39.7358],
   ["Гуамское ущелье", 44.1816, 39.1342],
   ["Озеро Кардывач", 44.1860, 40.0991],
   ["Соленое озеро", 44.1026, 39.0663],
   ["Лотосовые поля", 44.5071, 38.0882],
   ["Пшадские водопады", 44.1839, 39.1384],
   ["Каверзинские водопады", 44.1946, 39.1257],
   ["Ачипсинские водопады", 44.1950, 39.1280],
   ["Набережная Сочи", 43.5859, 39.7206],
   ["Сафари-парк", 43.5770, 39.7268],
   ["Парк «Олимп»", 43.5988, 39.7275],
   ["Горячий Ключ", 44.2303, 40.0842]
];
places.forEach(function(p) {
   L.marker([p[1], p[2]])
    .addTo(map)
    .bindPopup(p[0]);
});
</script>
</body>
</html>
